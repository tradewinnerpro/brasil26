<style>

.pts-legend{display:flex;flex-wrap:wrap;gap:12px;background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:10px 14px;margin-bottom:14px;font-size:.68rem;color:var(--muted)}

.rk-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--gl));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.88rem;flex-shrink:0;color:#fff}

.btn-save-all{background:linear-gradient(135deg,#00a86b,#00c447);border:none;border-radius:36px;padding:10px 22px;font-weight:800;font-size:.8rem;color:#fff;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .2s;box-shadow:0 4px 12px rgba(0,196,71,.2);margin-left:auto}
.btn-save-all:hover{transform:translateY(-1px);background:#00b85a}
.modal-ov{position:fixed;inset:0;z-index:999;background:rgba(0,0,0,.82);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:14px}
.modal-ov.open{display:flex}
.mbox{background:rgba(10,22,14,.98);border:1px solid var(--brd-g);border-radius:18px;padding:28px;max-width:380px;width:100%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.7);animation:mIn .22s ease;position:relative}
@keyframes mIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.m-close{position:absolute;top:11px;right:14px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
.inp{width:100%;padding:11px 13px;background:rgba(0,0,0,.5);border:1.5px solid var(--border);border-radius:9px;color:var(--text);font-family:var(--fb);font-size:.86rem;outline:none;margin-bottom:9px}
.btn-sub{width:100%;padding:12px;background:linear-gradient(135deg,var(--green),var(--gl));border:none;border-radius:9px;color:#fff;font-weight:800;font-size:.86rem;cursor:pointer;font-family:var(--fb);text-transform:uppercase;transition:all .2s}
.btn-sub.ghost{background:rgba(255,255,255,.07);color:var(--text);box-shadow:none}
.m-sm{font-size:.64rem;color:var(--dim);margin-top:8px}
.sync-bar{position:fixed;bottom:16px;right:16px;background:var(--s2);border:1px solid var(--border);border-radius:50px;padding:7px 12px;font-size:.68rem;display:flex;align-items:center;gap:6px;z-index:200}
.sdot{width:6px;height:6px;border-radius:50%;background:var(--dim);flex-shrink:0}
.sdot.ok{background:var(--green);box-shadow:0 0 5px var(--green)}
.sdot.sv{background:var(--gold);animation:blink .8s ease-in-out infinite}
.sdot.er{background:var(--red)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#tc{position:fixed;top:16px;right:16px;z-index:1000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--s1);border:1px solid var(--brd-g);color:var(--text);padding:10px 16px;border-radius:16px;font-weight:600;font-size:.76rem;box-shadow:0 6px 18px rgba(0,0,0,.5);animation:tIn .24s ease;max-width:250px}
@keyframes tIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
footer{text-align:center;padding:30px 14px;color:var(--dim);font-size:.68rem;border-top:1px solid var(--border);margin-top:10px}
@media(max-width:640px){.pred-row{grid-template-columns:50px 1fr 96px 1fr 36px}.sinp{width:36px;height:40px;font-size:1rem}}
</style>

<body>
<div class="fbg"></div>
<div class="app">
<header class="hdr"><div class="wrap"><div class="hdr-in">
  <div class="brand"><div class="troph">🏆</div><div><div class="brand-ttl">COPA DO MUNDO 2026</div><div class="brand-sub">🇺🇸 · 🇨🇦 · 🇲🇽 · 11 Jun – 19 Jul</div></div></div>
  <div id="authArea"><button class="btn-join" onclick="openLogin()">⚽ Participar do Bolão</button></div>
</div></div></header>
<nav class="nav"><div class="wrap"><div class="nav-list">
  <button class="nav-btn on" data-tab="tabela">📊 <span class="lbl">Tabela</span></button>
  <button class="nav-btn" data-tab="palpites">🎯 <span class="lbl">Palpites</span></button>
  <button class="nav-btn" data-tab="ranking">🏅 <span class="lbl">Ranking</span></button>
  <button class="nav-btn" data-tab="admin">🔐 <span class="lbl">Admin</span><span class="adm-dot" id="admDot"></span></button>
</div></div></nav>
<main class="wrap">
  <div id="panel-tabela" class="panel on"></div>
  <div id="panel-palpites" class="panel"></div>
  <div id="panel-ranking" class="panel"></div>
  <div id="panel-admin" class="panel"></div>
</main>
</div>
<div class="modal-ov" id="loginModal"><div class="mbox"><button class="m-close" onclick="closeModal('loginModal')">✕</button><div class="m-ico">⚽</div><h2 class="m-ttl">BOLÃO 2026</h2><p class="m-txt">Dê seus palpites e concorra!</p><input class="inp" id="lName" placeholder="Seu apelido" maxlength="20"><input class="inp" id="lPass" type="password" placeholder="Senha (mín. 4)"><div class="m-err" id="loginErr"></div><button class="btn-sub" onclick="doLogin()">🚀 Entrar</button><p class="m-sm">Primeiro acesso? Conta criada automaticamente.</p></div></div>
<div class="sync-bar" id="syncBar"><div class="sdot" id="sdot"></div><span id="sdotTxt">Local</span><button style="background:transparent;border:none;color:var(--green);font-size:.7rem;margin-left:4px;cursor:pointer" onclick="checkDbConnection()">⟳ BD</button></div>
<div id="tc"></div>
<footer>⚽ Copa do Mundo 2026 · 48 Seleções · 104 Jogos · Bolão com Supabase + salvamento manual / automático</footer>

<script>
const CFG = { SUPA_URL: 'https://omgcjhvhezcikfjyfonw.supabase.co', SUPA_KEY: 'sb_publishable_06GuHSVCvqZ7OlwgXJdtfw_RwM5d663', ADMIN_PASS:'copa2026' };
let supa = null;
try { if (!CFG.SUPA_URL.includes('SEU_PROJETO')) supa = window.supabase.createClient(CFG.SUPA_URL, CFG.SUPA_KEY); } catch(e) {}

let ST = { user:null, admin:false, results:{}, preds:{} };
function load() { try { const r=localStorage.getItem('c26r'); if(r) ST.results=JSON.parse(r); const p=localStorage.getItem('c26p'); if(p) ST.preds=JSON.parse(p); const u=localStorage.getItem('c26u'); if(u) ST.user=JSON.parse(u); } catch(e){} }
function save() { localStorage.setItem('c26r',JSON.stringify(ST.results)); localStorage.setItem('c26p',JSON.stringify(ST.preds)); if(ST.user) localStorage.setItem('c26u',JSON.stringify(ST.user)); else localStorage.removeItem('c26u'); }
const getRes = id => ST.results[id]||null;
function setRes(id,h,a){ ST.results[id]={h,a}; save(); if(supa) supa.from('partidas').update({ placar_casa: h, placar_visitante: a }).eq('id', id).then(); }
function setPredLocal(id,h,a){ if(!ST.user) return; if(!ST.preds[ST.user.name]) ST.preds[ST.user.name]={}; ST.preds[ST.user.name][id]={h,a}; save(); }
function delPredLocal(id){ if(ST.user&&ST.preds[ST.user.name]) delete ST.preds[ST.user.name][id]; save(); }

async function syncPredToSupabase(user, matchId, h, a) {
  if(!supa || !user) return;
  try {
    await supa.from('palpites').upsert({ user_name: user, match_id: matchId, placar_casa: h, placar_visitante: a, updated_at: new Date() }, { onConflict: 'user_name,match_id' });
    setSyncStatus('ok','BD ✓');
  } catch(e) { console.warn(e); setSyncStatus('er','Erro BD'); }
}

async function loadPredsFromSupabase(user) {
  if(!supa || !user) return;
  try {
    const { data, error } = await supa.from('palpites').select('match_id,placar_casa,placar_visitante').eq('user_name', user);
    if(error) throw error;
    if(data && data.length) {
      if(!ST.preds[user]) ST.preds[user] = {};
      data.forEach(p => { ST.preds[user][p.match_id] = { h: p.placar_casa, a: p.placar_visitante }; });
      save();
      if(document.getElementById('panel-palpites').classList.contains('on')) renderPalpites();
    }
  } catch(e) { toast('⚠️ Erro ao carregar palpites do servidor'); }
}

async function saveAllPredictionsToDB() {
  if(!ST.user) { toast('Faça login primeiro'); return; }
  const allInputs = document.querySelectorAll('#panel-palpites .sinp');
  let updated=0;
  for(let inp of allInputs) {
    const mid = parseInt(inp.dataset.pmid);
    if(isNaN(mid)) continue;
    const row = inp.closest('.pred-row');
    const hInp = row.querySelector('[data-side="h"]');
    const aInp = row.querySelector('[data-side="a"]');
    const hv = hInp.value.trim(), av = aInp.value.trim();
    if(hv !== '' && av !== '') {
      const h = Math.max(0,parseInt(hv)||0), a = Math.max(0,parseInt(av)||0);
      setPredLocal(mid, h, a);
      await syncPredToSupabase(ST.user.name, mid, h, a);
      updated++;
      // atualiza pontuação visual
      const res = getRes(mid), pp = calcPts({h,a},res);
      const badge = row.querySelector('.pts-badge');
      if(badge){ badge.className='pts-badge '+pClass(pp); badge.textContent=pLabel(pp); }
    } else if(hv==='' && av==='') {
      delPredLocal(mid);
      if(supa) await supa.from('palpites').delete().eq('user_name', ST.user.name).eq('match_id', mid);
    }
  }
  toast(`💾 ${updated} palpites salvos no banco de dados!`);
  renderRanking();
}

function checkDbConnection() {
  if(!supa) { toast('❌ Supabase não configurado'); setSyncStatus('er','Sem BD'); return; }
  setSyncStatus('sv','Testando...');
  supa.from('partidas').select('id', { head: true, count: 'exact' }).then(({ error, count }) => {

function renderPalpites() {

  Object.keys(GROUPS).forEach(g=>{ const rounds={}; MATCHES.filter(m=>m.g===g).forEach(m=>{if(!rounds[m.r])rounds[m.r]=[]; rounds[m.r].push(m);}); let rows=''; Object.entries(rounds).forEach(([rn,ms])=>{ rows+=`<div class="round-lbl">Rodada ${rn}</div>`; ms.forEach(m=>{ const pred=getPredLocal(m.id), res=getRes(m.id), pp=calcPts(pred,res); const hv=pred?pred.h:''; const ofcl=res?`<div class="ofcl">Oficial<strong>${res.h}:${res.a}</strong></div>`:`<div class="ofcl" style="color:var(--dim)">Aguardando</div>`; rows+=`<div class="pred-row"><div class="m-dt"><div class="m-d">${m.dt}</div><div class="m-t">${m.tm}</div></div><div class="m-home">${fi(m.h,22)}<span class="t-name">${m.h}</span></div><div class="sz" style="flex-direction:column;gap:2px"><div style="display:flex;gap:3px"><input type="number" class="sinp" data-pmid="${m.id}" data-side="h" value="${hv}" min="0" max="30" inputmode="numeric"><span class="ssep">:</span><input type="number" class="sinp" data-pmid="${m.id}" data-side="a" value="${pred?pred.a:''}" min="0" max="30" inputmode="numeric"></div>${ofcl}</div><div class="m-away"><span class="t-name">${m.a}</span>${fi(m.a,22)}</div><div class="pts-badge ${pClass(pp)}">${pLabel(pp)}</div></div>`; }); }); html+=`<div class="gc"><div class="gc-head"><span class="gc-ttl">GRUPO ${g}</span></div><div class="rounds-section">${rows}</div></div>`; }); html+='</div>'; el.innerHTML=html;

function renderRanking(){ let allU=[...new Set([...Object.keys(ST.preds),...(ST.user?[ST.user.name]:[])])]; let lb=allU.map(u=>{ let total=0,ct=0; MATCHES.forEach(m=>{let pr=(ST.preds[u]||{})[m.id]; if(pr){ct++;let pp=calcPts(pr,getRes(m.id)); if(pp!==null)total+=pp;}}); return{u,total,ct}; }).sort((a,b)=>b.total-a.total||b.ct-a.ct); let rows=lb.map((x,i)=>(`<div class="rk-row${ST.user&&x.u===ST.user.name?' me':''}"><div class="rk-pos">${i<3?['🥇','🥈','🥉'][i]:i+1}</div><div class="rk-av">${x.u[0].toUpperCase()}</div><div class="rk-name">${escH(x.u)}${ST.user&&x.u===ST.user.name?'<span class="rk-me">você</span>':''}</div><div><div class="rk-pts">${x.total}</div><div class="rk-sub">${x.ct} palpite(s)</div></div></div>`)).join(''); document.getElementById('panel-ranking').innerHTML=`<div class="sec-h">🏅 RANKING</div><div class="rk-card">${rows||'<div style="padding:24px;text-align:center">Nenhum palpite</div>'}</div>`; }
function renderTabela(){ let out='<div class="br-hero"><span class="br-hero-flag">🇧🇷</span><div class="br-hero-title">VAI BRASIL!</div><div class="br-hero-sub">Grupo C</div></div><div class="gg">'; Object.keys(GROUPS).forEach(g=>{ let st=calcStandings(g); let stRows=st.map((row,i)=>(`<tr><td><span class="pb pb${i+1>4?4:i+1}">${i+1}</span></td><td><div class="team-cell">${fi(row.t,24)}<span>${row.t}</span></div></td><td class="pts-v">${row.pts}</td><td>${row.j}</td><td>${row.v}</td><td>${row.e}</td><td>${row.d}</td><td>${row.gp}</td><td>${row.gc}</td><td>${row.sg>0?'+'+row.sg:row.sg}</td></tr>`)).join(''); let rounds={}; MATCHES.filter(m=>m.g===g).forEach(m=>{if(!rounds[m.r])rounds[m.r]=[]; rounds[m.r].push(m);}); let matchRows=''; Object.entries(rounds).forEach(([rn,ms])=>{ matchRows+=`<div class="round-lbl">Rodada ${rn}</div>`; ms.forEach(m=>{ let res=getRes(m.id); let scoreHtml=ST.admin? `<div class="sz"><input type="number" class="sinp" data-mid="${m.id}" data-side="h" value="${res?res.h:''}" min="0" max="30" inputmode="numeric"><span class="ssep">:</span><input type="number" class="sinp" data-mid="${m.id}" data-side="a" value="${res?res.a:''}" min="0" max="30" inputmode="numeric"></div>` : (res?`<div class="sdsp"><span class="${res.h>res.a?'sw':res.h<res.a?'sl':'sd'}">${res.h}</span><span>:</span><span class="${res.a>res.h?'sw':res.a<res.h?'sl':'sd'}">${res.a}</span></div>`:`<div class="sdsp novs">vs</div>`); matchRows+=`<div class="mr"><div class="m-dt"><div class="m-d">${m.dt}</div><div class="m-t">${m.tm}</div></div><div class="m-home">${fi(m.h,22)}<span class="t-name">${m.h}</span></div>${scoreHtml}<div class="m-away"><span class="t-name">${m.a}</span>${fi(m.a,22)}</div></div>`; }); }); out+=`<div class="gc"><div class="gc-head"><span class="gc-ttl">GRUPO ${g}</span></div><table class="stt"><thead><tr><th>#</th><th>Seleção</th><th>P</th><th>J</th><th>V</th><th>E</th><th>D</th><th>GP</th><th>GC</th><th>SG</th></tr></thead><tbody>${stRows}</tbody></table><div class="rounds-section">${matchRows}</div></div>`; }); out+='</div>'; document.getElementById('panel-tabela').innerHTML=out; if(ST.admin) attachAdminListeners(); }
function calcStandings(g){ let st={}; GROUPS[g].forEach(t=>{st[t]={pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0};}); MATCHES.filter(m=>m.g===g).forEach(m=>{let r=getRes(m.id); if(!r) return; let h=r.h,a=r.a; st[m.h].j++; st[m.a].j++; st[m.h].gp+=h; st[m.h].gc+=a; st[m.a].gp+=a; st[m.a].gc+=h; if(h>a){ st[m.h].v++; st[m.h].pts+=3; st[m.a].d++; } else if(a>h){ st[m.a].v++; st[m.a].pts+=3; st[m.h].d++; } else{ st[m.h].e++; st[m.a].e++; st[m.h].pts++; st[m.a].pts++; } }); return Object.entries(st).map(([t,s])=>({t,...s,sg:s.gp-s.gc})).sort((a,b)=>b.pts-a.pts||(b.sg-a.sg)||b.gp-a.gp||a.t.localeCompare(b.t)); }
function attachAdminListeners(){ document.querySelectorAll('#panel-tabela .sinp').forEach(inp=>{ inp.addEventListener('input',e=>{ let mid=parseInt(e.target.dataset.mid); clearTimeout(window._resDeb?.[mid]); window._resDeb=window._resDeb||{}; window._resDeb[mid]=setTimeout(()=>{ let row=e.target.closest('.mr'); let hI=row.querySelector('[data-side="h"]'), aI=row.querySelector('[data-side="a"]'); let hv=hI.value.trim(), av=aI.value.trim(); if(hv===''&&av===''){ delete ST.results[mid]; save(); } else if(hv!==''&&av!==''){ let h=Math.max(0,parseInt(hv)||0), a=Math.max(0,parseInt(av)||0); setRes(mid,h,a); } renderTabela(); },600); }); }); }
