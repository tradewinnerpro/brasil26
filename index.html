function setSyncStatus(state,txt){
  document.getElementById('sdot').className='sdot '+state;
  document.getElementById('sdotTxt').textContent=txt;
}

// Carrega resultados do banco
async function syncFromSupabase(){
  if(!supa) return;
  try{
    const{data,error}=await supa.from('partidas').select('id,placar_casa,placar_visitante').lte('id',104);
    if(error) throw error;
    (data||[]).forEach(r=>{
      if(r.placar_casa!==null&&r.placar_visitante!==null)
        ST.results[r.id]={h:r.placar_casa,a:r.placar_visitante};
    });
    save();
    setSyncStatus('ok','Supabase ✓');
    subscribeRT();
  }catch(e){ setSyncStatus('er','Offline'); }
}

// Salva resultado no banco
async function saveToSupa(id,h,a){
  if(!supa) return;
  setSyncStatus('sv','Salvando...');
  try{
    await supa.from('partidas').update({placar_casa:h,placar_visitante:a}).eq('id',id);
    setSyncStatus('ok','Salvo ✓');
    setTimeout(()=>setSyncStatus('ok','Supabase ✓'),1500);
  }catch(e){ setSyncStatus('er','Erro'); }
}

// Salva palpite no banco (upsert)
async function savePredSupa(apelido,partidaId,h,a){
  if(!supa) return;
  try{
    await supa.from('palpites').upsert(
      {apelido,partida_id:partidaId,palpite_casa:h,palpite_visitante:a},
      {onConflict:'apelido,partida_id'}
    );
  }catch(e){}
}

// Carrega palpites do banco para um usuário
async function loadPredsFromSupa(apelido){
  if(!supa) return false;
  try{
    const{data,error}=await supa.from('palpites')
      .select('partida_id,palpite_casa,palpite_visitante')
      .eq('apelido',apelido);
    if(error) throw error;
    if(!ST.preds[apelido]) ST.preds[apelido]={};
    (data||[]).forEach(r=>{
      ST.preds[apelido][r.partida_id]={h:r.palpite_casa,a:r.palpite_visitante};
    });
    save();
    return true;
  }catch(e){ return false; }
}

// Migra palpites do localStorage para o Supabase (só na primeira vez)
async function migrateLocalPreds(apelido){
  if(!supa) return;
  const local=ST.preds[apelido]||{};
  const entries=Object.entries(local).filter(([,sc])=>sc.h!==null&&sc.h!==undefined);
  if(!entries.length) return;
  try{
    const rows=entries.map(([id,sc])=>({
      apelido,partida_id:parseInt(id),palpite_casa:sc.h,palpite_visitante:sc.a
    }));
    await supa.from('palpites').upsert(rows,{onConflict:'apelido,partida_id'});
    toast(`☁️ ${rows.length} palpite${rows.length>1?'s':''} salvo${rows.length>1?'s':''} na nuvem!`);
  }catch(e){}
}

// Carrega + migra dados do usuário ao fazer login
async function loadUserData(apelido){
  setSyncStatus('sv','Sincronizando...');
  await migrateLocalPreds(apelido);  // 1. envia local → banco
  await loadPredsFromSupa(apelido);  // 2. carrega banco → local
  setSyncStatus('ok','Sincronizado ✓');
  renderPalpites();
  renderRanking();
}

// Real-time: resultados e palpites
function subscribeRT(){
  if(!supa) return;
  supa.channel('partidas-rt')
    .on('postgres_changes',{event:'UPDATE',schema:'public',table:'partidas'},p=>{
      const r=p.new;
      if(r.placar_casa!==null&&r.placar_visitante!==null)
        ST.results[r.id]={h:r.placar_casa,a:r.placar_visitante};
      else delete ST.results[r.id];
      save(); refreshAllPanels();
      toast('⚽ Placar atualizado ao vivo!');
    }).subscribe();

// ══════════════════════════════════════════════════════
function calcPts(pred,res){
  if(!res)return null; if(!pred)return 0;
  const{h:ph,a:pa}=pred,{h:rh,a:ra}=res;
  if(ph===rh&&pa===ra)return 10;
  const po=ph>pa?'H':ph<pa?'A':'D',ro=rh>ra?'H':rh<ra?'A':'D';
  return po===ro?5:0;
}
const pClass=p=>p===null?'ptsnull':p===10?'pts10':p===5?'pts5':'pts0';
const pLabel=p=>p===null?'—':p>0?'+'+p:'0';

// ══════════════════════════════════════════════════════
//  📊  CLASSIFICAÇÃO
// ══════════════════════════════════════════════════════
function calcSt(g){
  const st={};
  GROUPS[g].forEach(t=>{st[t]={pts:0,j:0,v:0,e:0,d:0,gp:0,gc:0}});
  MATCHES.filter(m=>m.g===g).forEach(m=>{
    const r=getRes(m.id);if(!r)return;
    const h=r.h,a=r.a;
    st[m.h].j++;st[m.a].j++;st[m.h].gp+=h;st[m.h].gc+=a;st[m.a].gp+=a;st[m.a].gc+=h;
    if(h>a){st[m.h].v++;st[m.h].pts+=3;st[m.a].d++;}
    else if(a>h){st[m.a].v++;st[m.a].pts+=3;st[m.h].d++;}
    else{st[m.h].e++;st[m.a].e++;st[m.h].pts++;st[m.a].pts++;}
  });
  return Object.entries(st)
    .map(([t,s])=>({t,...s,sg:s.gp-s.gc}))
    .sort((a,b)=>b.pts-a.pts||(b.sg-a.sg)||b.gp-a.gp||a.t.localeCompare(b.t));
}

function updateInlineStandings(mid){

  tbody.innerHTML=st.map((row,i)=>{

    const br=st.find(s=>s.t==='Brasil')||{pts:0,j:0,v:0,gp:0,gc:0,sg:0};

}

//  ⏱️  CONTROLE DE TEMPO
// ══════════════════════════════════════════════════════
function getMatchUTC(m){
  const[d,mo]=m.dt.split('/').map(Number);
  const[h,mn]=m.tm.split(':').map(Number);
  return new Date(Date.UTC(2026,mo-1,d,h+3,mn));
}
function matchStatus(m){
  const kick=getMatchUTC(m),lock=new Date(kick-5*60*1000),end=new Date(kick+115*60*1000),now=Date.now();
  if(now<lock)return{s:'open',ms:lock-now};
  if(now<end)return{s:'live',ms:end-now};
  return{s:'ended',ms:0};
}
function fmtCountdown(ms){
  const d=Math.floor(ms/86400000),h=Math.floor((ms%86400000)/3600000),m=Math.floor((ms%3600000)/60000);
  if(d>0)return`${d}d ${h}h`;if(h>0)return`${h}h ${m}min`;if(m>0)return`${m}min`;return'<1min';
}

const ESPN_MAP={
  'Brazil':'Brasil','Morocco':'Marrocos','Haiti':'Haiti','Scotland':'Escócia',
  'Mexico':'México','South Africa':'África do Sul','Korea Republic':'Coreia do Sul',
  'Czech Republic':'República Tcheca','Czechia':'República Tcheca',
  'Canada':'Canadá','Qatar':'Catar','Switzerland':'Suíça',
  'Bosnia-Herzegovina':'Bósnia e Herzegovina','Bosnia and Herzegovina':'Bósnia e Herzegovina',
  'United States':'Estados Unidos','USA':'Estados Unidos','Paraguay':'Paraguai',
  'Australia':'Austrália','Turkey':'Turquia','Germany':'Alemanha',
  'Curacao':'Curaçao',"Cote d'Ivoire":'Costa do Marfim',"Ivory Coast":'Costa do Marfim',
  'Ecuador':'Equador','Netherlands':'Holanda','Japan':'Japão','Sweden':'Suécia',
  'Tunisia':'Tunísia','Belgium':'Bélgica','Egypt':'Egito','Iran':'Irã',
  'New Zealand':'Nova Zelândia','Spain':'Espanha','Cape Verde':'Cabo Verde',
  'Saudi Arabia':'Arábia Saudita','Uruguay':'Uruguai','France':'França',
  'Senegal':'Senegal','Iraq':'Iraque','Norway':'Noruega','Argentina':'Argentina',
  'Algeria':'Argélia','Austria':'Áustria','Jordan':'Jordânia','Portugal':'Portugal',
  'DR Congo':'RD do Congo','Congo DR':'RD do Congo','Uzbekistan':'Uzbequistão',
  'Colombia':'Colômbia','England':'Inglaterra','Croatia':'Croácia','Ghana':'Gana','Panama':'Panamá',
};
function espnName(n){return ESPN_MAP[n]||n;}

let espnTimer=null,lastEspnFetch=null,espnCount=0;

async function fetchEspn(silent=false){
  let updated=0;
  // Busca hoje + últimos 7 dias
  const dates=[];
  for(let i=0;i<=7;i++){
    const d=new Date(Date.now()-i*86400000);
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }
  for(const dt of dates){
    try{
      const r=await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dt}`,{cache:'no-store'});
      if(!r.ok)continue;
      const data=await r.json();
      lastEspnFetch=new Date();espnCount++;
      (data.events||[]).forEach(ev=>{
        const comp=ev.competitions?.[0];if(!comp)return;
        const sn=comp.status?.type?.name||'';
        if(!['STATUS_FINAL','STATUS_IN_PROGRESS','STATUS_HALFTIME'].includes(sn))return;
        const home=comp.competitors?.find(c=>c.homeAway==='home');
        const away=comp.competitors?.find(c=>c.homeAway==='away');
        if(!home||!away)return;
        const hName=espnName(home.team?.displayName||'');
        const aName=espnName(away.team?.displayName||'');
        const hs=parseInt(home.score),as2=parseInt(away.score);
        if(isNaN(hs)||isNaN(as2))return;
        const match=MATCHES.find(m=>m.h===hName&&m.a===aName);
        if(match){
          const cur=getRes(match.id);
          if(!cur||cur.h!==hs||cur.a!==as2){setRes(match.id,hs,as2);updated++;}
        }
      });
    }catch(e){}
  }
  if(updated>0){
    refreshAllPanels();
    if(!silent)toast(`⚽ ${updated} resultado${updated>1?'s':''} atualizado${updated>1?'s':''}!`);
  }
  updateEspnDot();
  return updated;
}

function startEspn(){
  fetchEspn(false);
  clearInterval(espnTimer);
  espnTimer=setInterval(()=>fetchEspn(true),45000); // 45 seg
}
function updateEspnDot(){
  const dot=document.getElementById('liveDot'),txt=document.getElementById('liveTxt');
  if(!dot)return;
  dot.className='auto-dot on';
  txt.textContent=lastEspnFetch?'ESPN ✓ '+lastEspnFetch.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}):'ESPN buscando...';
}

    <div class="adm-badge" style="background:rgba(0,196,71,.14);border-color:var(--brd-g);color:var(--gl)">✅ Admin Ativo</div>
    <button class="btn-sub ghost" style="width:auto;padding:8px 16px;font-size:.75rem" onclick="exitAdmin()">🔒 Sair</button>
  </div>

  <!-- STATUS -->
  <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px 16px;margin-bottom:22px;font-size:.78rem;line-height:2">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <div>
        🔄 Supabase: <strong style="color:${supa?'var(--gl)':'var(--red)'}">${supa?'✅ Conectado':'❌ Não conectado'}</strong>
        &nbsp;|&nbsp; 
        ⚽ ESPN Auto: <span style="display:inline-flex;align-items:center;gap:4px">
          <span class="auto-dot on" id="liveDot"></span>
          <span id="liveTxt" style="font-size:.68rem;color:var(--muted)">Ativo</span>
        </span>
      </div>
      <div style="display:flex;gap:6px">
        <button class="act-btn rst" onclick="fetchEspn(false)">🔄 Buscar ESPN Agora</button>
        <button class="act-btn del" onclick="resetAllResults()">🗑️ Zerar Resultados</button>
      </div>
    </div>
    <div style="font-size:.66rem;color:var(--dim);margin-top:6px">
      ⚡ ESPN busca resultados a cada 45 segundos automaticamente durante a Copa.<br>
      ✏️ Para editar resultados manualmente, vá para a aba 📊 Tabela.
    </div>
  </div>

  <!-- PARTICIPANTES -->
  <div class="sec-h" style="font-size:1.4rem">👥 PARTICIPANTES
    <span style="font-family:var(--fb);font-size:.73rem;color:var(--muted)">${lb.length} cadastrado${lb.length!==1?'s':''}</span>
  </div>
  <div style="background:var(--s1);border:1px solid var(--border);border-radius:var(--r);overflow:auto;margin-bottom:10px">
    <table class="part-table">
      <thead><tr><th>#</th><th>Participante</th><th>Pts</th><th>Palpites</th><th>🎯 Exatos</th><th>✅ Certos</th><th>Ações</th></tr></thead>
      <tbody>${partRows}</tbody>
    </table>
  </div>
  <p style="font-size:.64rem;color:var(--dim);margin-bottom:22px">
    🔄 Zerar — apaga palpites mas mantém conta &nbsp;|&nbsp; 🗑️ Excluir — remove conta e palpites do banco
  </p>`;

  document.getElementById('admDot').classList.add('show');
  updateEspnDot();
}

function tryAdmin(){
  const v=document.getElementById('ap2')?.value||'';
  if(v===CFG.ADMIN_PASS){ST.admin=true;renderAdmin();renderTabela();toast('✅ Admin ativado!');}
  else toast('❌ Senha incorreta.');
}
function exitAdmin(){ST.admin=false;renderAdmin();renderTabela();toast('🔒 Admin desativado.');}

// ══════════════════════════════════════════════════════
//  🔑  AUTH
// ══════════════════════════════════════════════════════
function openLogin(){
  document.getElementById('loginModal').classList.add('open');
  document.getElementById('lName').focus();
  document.getElementById('loginHint').textContent='';
  updateLoginUI('');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function updateLoginUI(name){
  const hint=document.getElementById('loginHint'),ico=document.getElementById('loginIco');
  const ttl=document.getElementById('loginTtl'),btn=document.getElementById('loginBtn'),sm=document.getElementById('loginSm');
  if(!name){hint.textContent='';return;}
  const exists=!!localStorage.getItem('c26_acc_'+name);
  if(exists){
    hint.textContent='👋 Conta encontrada — faça login';hint.style.color='var(--gl)';
    ico.textContent='👤';ttl.textContent='BEM-VINDO DE VOLTA';btn.textContent='🔓 Entrar';sm.textContent='';
  }else{
    hint.textContent='✨ Novo usuário — será cadastrado agora';hint.style.color='var(--gold)';
    ico.textContent='🆕';ttl.textContent='CRIAR CONTA';
    btn.textContent='🚀 Cadastrar e Entrar';
    sm.textContent='Guarde sua senha — precisará dela para voltar.';
  }
}
function doLogin(){
  const name=document.getElementById('lName').value.trim();
  const pass=document.getElementById('lPass').value.trim();
  const err=document.getElementById('loginErr');
  err.style.display='none';
  if(!name){err.textContent='Digite um apelido.';err.style.display='block';return;}
  if(!pass||pass.length<4){err.textContent='Senha mínima de 4 caracteres.';err.style.display='block';return;}
  const stored=localStorage.getItem('c26_acc_'+name);
  if(stored){
    if(JSON.parse(stored).h!==btoa(pass)){err.textContent='❌ Senha incorreta.';err.style.display='block';return;}
    toast(`👋 Bem-vindo de volta, ${name}!`);
  }else{
    localStorage.setItem('c26_acc_'+name,JSON.stringify({h:btoa(pass),criado:Date.now()}));
    toast(`🎉 Conta criada! Bem-vindo, ${name}!`);
  }
  ST.user={name};save();closeModal('loginModal');
  document.getElementById('lName').value='';document.getElementById('lPass').value='';
  updateAuthUI();
  // Sincroniza palpites com Supabase
  loadUserData(name);
}
function doLogout(){
  if(!confirm('Sair do bolão?'))return;
  ST.user=null;save();updateAuthUI();renderPalpites();renderRanking();toast('Você saiu do bolão.');
}
function updateAuthUI(){
  const a=document.getElementById('authArea');
  a.innerHTML=ST.user
    ?`<div class="user-pill">⚽ <strong>${escH(ST.user.name)}</strong><button class="btn-out" onclick="doLogout()">Sair</button></div>`
    :`<button class="btn-join" onclick="openLogin()">⚽ Participar do Bolão</button>`;
}

// ══════════════════════════════════════════════════════
//  🍞  UTILS
// ══════════════════════════════════════════════════════
function toast(msg){
  const c=document.getElementById('tc'),d=document.createElement('div');
  d.className='toast';d.textContent=msg;c.appendChild(d);
  setTimeout(()=>{d.style.opacity='0';d.style.transform='translateX(20px)';d.style.transition='.3s';setTimeout(()=>d.remove(),320);},2600);
}
function escH(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function refreshAllPanels(){
  const active=document.querySelector('.panel.on');if(!active)return;
  const tab=active.id.replace('panel-','');
  if(tab==='tabela')renderTabela();
  else if(tab==='palpites')renderPalpites();
  else if(tab==='ranking')renderRanking();
  else if(tab==='admin')renderAdmin();
}

// ══════════════════════════════════════════════════════
//  🧭  NAVIGATION
// ══════════════════════════════════════════════════════
document.querySelectorAll('.nav-btn').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('on'));
    this.classList.add('on');
    const tab=this.dataset.tab;
    document.getElementById('panel-'+tab).classList.add('on');
    if(tab==='tabela')renderTabela();
    else if(tab==='palpites')renderPalpites();
    else if(tab==='ranking')renderRanking();
    else if(tab==='admin')renderAdmin();
    window.scrollTo({top:0,behavior:'smooth'});
  });
});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal('loginModal');});
document.querySelectorAll('.modal-ov').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)closeModal(m.id);}));
document.getElementById('lPass').addEventListener('keypress',e=>{if(e.key==='Enter')doLogin();});
document.getElementById('lName').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('lPass').focus();});
document.getElementById('lName').addEventListener('input',e=>updateLoginUI(e.target.value.trim()));

// ══════════════════════════════════════════════════════
//  🚀  INIT
// ══════════════════════════════════════════════════════
load();
updateAuthUI();
renderTabela();
// Carrega resultados do Supabase
if(supa){
  syncFromSupabase();
}else{
  setSyncStatus('','Sem Supabase');
}
// ESPN automático — 45s (Copa está acontecendo agora!)
startEspn();
// Se já estava logado, sincroniza palpites
if(ST.user) loadUserData(ST.user.name);
</script>
</body>
</html>
